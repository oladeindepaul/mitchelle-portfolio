<header class="nav">
  <a class="brand" href="index.html" aria-label="Oreoluwa Oladeinde, home">
    <img class="oo" src="https://res.cloudinary.com/dt8eebw4e/image/upload/v1782415147/3e57188f-56fa-4f72-945c-d29472e1f4ba_yxgpcu.jpg" alt="Oreoluwa Oladeinde">
    <span class="mark"><b>Oreoluwa</b><span class="dot">.</span></span>
  </a>
  <button class="nav__toggle" id="navToggle" aria-expanded="false" aria-controls="navLinks" aria-label="Menu"><span></span><span></span><span></span></button>
  <nav>
    <ul class="nav__links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a class="nav__cta" href="contact.html" aria-current="page">Hire me</a></li>
    </ul>
  </nav>
</header>

<main>
  <section class="hire wrap">
    <div class="hire__grid">
      <div>
        <p class="eyebrow reveal">Hire me</p>
        <h1 class="intro__h reveal">Let's give your brand a voice people <em>follow.</em></h1>
        <p class="intro__sub reveal">Tell me a little about your brand and what you're building. I'll get back to you soon.</p>
      </div>

      <div class="form-card reveal">
        <form id="hireForm" action="https://formspree.io/f/maqgjjjb" method="POST">
          <div class="f-row">
            <div class="field">
              <label for="fn">First name</label>
              <input id="fn" name="First name" type="text" autocomplete="given-name" required>
            </div>
            <div class="field">
              <label for="ln">Last name</label>
              <input id="ln" name="Last name" type="text" autocomplete="family-name" required>
            </div>
          </div>
          <div class="field">
            <label for="em">Email</label>
            <input id="em" name="email" type="email" autocomplete="email" required>
          </div>
          <div class="field">
            <label for="msg">Message</label>
            <textarea id="msg" name="Message" required></textarea>
          </div>
          <button class="submit" type="submit">
            Send message
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" width="16" height="16"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          </button>
          <p class="f-err" id="formErr" aria-live="polite"></p>
        </form>
      </div>
    </div>
  </section>
</main>

<!-- confirmation toast -->
<div class="toast-wrap" id="toast" role="dialog" aria-modal="true" aria-labelledby="toastTitle">
  <div class="toast">
    <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg></span>
    <h3 id="toastTitle">Message sent</h3>
    <p>I'll be in touch.</p>
    <button type="button" id="toastClose">Close</button>
  </div>
</div>

    </a>
  </div>
</footer>
